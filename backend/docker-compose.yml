services:
  postgres:
    image: postgres:16-alpine
    container_name: vivanapoli-db
    environment:
      POSTGRES_DB: vivanapoli
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vivanapoli"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivanapoli-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_URL=postgres://postgres:postgres@postgres:5432/vivanapoli?sslmode=disable
      - ALLOWED_ORIGINS=http://localhost:3000
      - JWT_SECRET=Oe10GeolXyGcxa521MFaPi3zC2ryqR5f5INx2w4pcbU
      - RESEND_API_KEY=re_5zE56LPV_5GJu32hLorrCRbDRwhDXrwMx
      - ORDER_EMAIL_TO=rudenokaleksandr21@gmail.com
      - ORDER_EMAIL_FROM=onboarding@resend.dev

volumes:
  postgres_data:
