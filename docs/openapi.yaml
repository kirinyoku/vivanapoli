openapi: 3.0.3
info:
  title: Viva Napoli REST API
  version: 1.0.0
  description: API for online ordering and management of the Viva Napoli pizzeria.
  contact:
    name: Development Team
    email: dev@vivanapoli.no
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://api.vivanapolinotodden.no
    description: Production server

tags:
  - name: Public
    description: Endpoints accessible without authentication
  - name: Authentication
    description: Admin login and token management
  - name: Categories
    description: Menu category management (admin only)
  - name: Menu Items
    description: Menu item management (admin only)
  - name: Orders
    description: Order processing and management
  - name: Settings
    description: Restaurant configuration
  - name: Health
    description: Service status checks

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Returns a simple status to verify the API is running.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/menu:
    get:
      tags:
        - Public
      summary: Get full menu
      description: Returns the entire menu grouped by category. Only available items are included.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryWithItems"

  /api/settings:
    get:
      tags:
        - Public
      summary: Get restaurant settings
      description: Returns key‑value configuration (opening hours, contact info, etc.).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsMap"

  /api/orders:
    post:
      tags:
        - Orders
      summary: Create a new order
      description: |
        Places a customer order. The request is validated, prices are snapshotted from the database,
        and an email notification is sent to the restaurant asynchronously.
        The order is rejected if the restaurant is closed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
        "400":
          description: Bad request (validation error or restaurant closed)
        "500":
          description: Internal server error

  /api/admin/login:
    post:
      tags:
        - Authentication
      summary: Authenticate admin user
      description: Validates admin credentials and returns a JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Missing email or password
        "401":
          description: Invalid credentials

  /api/admin/menu/categories:
    get:
      tags:
        - Categories
      summary: List all categories
      description: Returns a flat list of all menu categories (admin only).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      tags:
        - Categories
      summary: Create a new category
      description: Creates a new menu category (admin only).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "400":
          description: Validation error

  /api/admin/menu/categories/{id}:
    put:
      tags:
        - Categories
      summary: Update a category
      description: Updates an existing category (admin only).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      tags:
        - Categories
      summary: Delete a category
      description: Deletes a category (admin only). Items belonging to the category are not deleted.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Category deleted

  /api/admin/menu/items:
    get:
      tags:
        - Menu Items
      summary: List all menu items
      description: Returns a paginated list of all menu items (admin only).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      tags:
        - Menu Items
      summary: Create a new menu item
      description: Creates a new menu item (admin only).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemRequest"
      responses:
        "201":
          description: Menu item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /api/admin/menu/items/{id}:
    put:
      tags:
        - Menu Items
      summary: Update a menu item
      description: Updates an existing menu item (admin only).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemRequest"
      responses:
        "200":
          description: Menu item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      tags:
        - Menu Items
      summary: Delete a menu item
      description: Deletes a menu item (admin only). Existing order snapshots remain unchanged.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Menu item deleted

  /api/admin/orders:
    get:
      tags:
        - Orders
      summary: List all orders
      description: Returns all orders, most recent first (admin only).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /api/admin/orders/{id}/status:
    put:
      tags:
        - Orders
      summary: Update order status
      description: Updates the status of an existing order (admin only).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Order status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /api/admin/stats:
    get:
      tags:
        - Settings
      summary: Get dashboard statistics
      description: Returns aggregated statistics for the admin dashboard (admin only).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

  /api/admin/settings:
    put:
      tags:
        - Settings
      summary: Update settings
      description: Updates one or more global settings (admin only).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsMap"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsMap"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/admin/login

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pizza
        slug:
          type: string
          example: pizza
        sort_order:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time

    CategoryWithItems:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/MenuItem"

    MenuItem:
      type: object
      properties:
        id:
          type: integer
        category_id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price_small:
          type: number
          nullable: true
        price_large:
          type: number
          nullable: true
        discount_price_small:
          type: number
          nullable: true
        discount_price_large:
          type: number
          nullable: true
        allergens:
          type: array
          items:
            type: string
        is_available:
          type: boolean
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time

    CreateCategoryRequest:
      type: object
      required:
        - name
        - slug
      properties:
        name:
          type: string
        slug:
          type: string
        sort_order:
          type: integer

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        sort_order:
          type: integer

    CreateMenuItemRequest:
      type: object
      required:
        - category_id
        - name
        - price_small
        - price_large
      properties:
        category_id:
          type: integer
        name:
          type: string
        description:
          type: string
        price_small:
          type: number
        price_large:
          type: number
        discount_price_small:
          type: number
          nullable: true
        discount_price_large:
          type: number
          nullable: true
        allergens:
          type: array
          items:
            type: string
        is_available:
          type: boolean
        sort_order:
          type: integer

    UpdateMenuItemRequest:
      type: object
      properties:
        category_id:
          type: integer
        name:
          type: string
        description:
          type: string
        price_small:
          type: number
        price_large:
          type: number
        discount_price_small:
          type: number
          nullable: true
        discount_price_large:
          type: number
          nullable: true
        allergens:
          type: array
          items:
            type: string
        is_available:
          type: boolean
        sort_order:
          type: integer

    OrderItemRequest:
      type: object
      required:
        - menu_item_id
        - quantity
        - size
      properties:
        menu_item_id:
          type: integer
        quantity:
          type: integer
          minimum: 1
        size:
          type: string
          enum: [small, large]

    CreateOrderRequest:
      type: object
      required:
        - customer_name
        - customer_phone
        - order_type
        - items
      properties:
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_address:
          type: string
        order_type:
          type: string
          enum: [delivery, pickup]
        comment:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemRequest"

    OrderItemSnapshot:
      type: object
      properties:
        menu_item_id:
          type: integer
        name:
          type: string
        quantity:
          type: integer
        size:
          type: string
        unit_price:
          type: number
        total_price:
          type: number

    CreateOrderResponse:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [new, confirmed, preparing, ready, delivered]
        total_price:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemSnapshot"

    Order:
      type: object
      properties:
        id:
          type: integer
        customer_name:
          type: string
        customer_phone:
          type: string
        customer_address:
          type: string
        order_type:
          type: string
          enum: [delivery, pickup]
        order_status:
          type: string
          enum: [new, confirmed, preparing, ready, delivered]
        items:
          type: string
          description: JSON‑B snapshot of ordered items
        total_price:
          type: number
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    UpdateOrderStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [new, confirmed, preparing, ready, delivered]

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        email:
          type: string

    SettingsMap:
      type: object
      additionalProperties:
        type: string
      description: Key‑value pairs of restaurant configuration

    StatsResponse:
      type: object
      properties:
        total_orders:
          type: integer
          description: Number of orders placed today
        total_revenue:
          type: number
          description: Total revenue from orders placed today

# -----------------------------------------------------------------------------
# Security
security:
  - bearerAuth: []
